[graph]
all-features = true

[licenses]
allow = [
  "Apache-2.0",
  "MIT",
  "Unicode-3.0",
  "Unlicense",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
