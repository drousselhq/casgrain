name: android-emulator-smoke

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/application/**
      - crates/casgrain/**
      - crates/compiler/**
      - crates/domain/**
      - crates/runner/**
      - crates/android/**
      - tests/test-support/fixtures/android-smoke/**
      - tests/test-support/fixtures/android-smoke/reliability-issue-sync/**
      - tests/test-support/scripts/android_smoke_run_plan.py
      - tests/test-support/scripts/android_smoke_reliability_window.py
      - tests/test-support/scripts/android_smoke_issue_sync.py
      - tests/test-support/scripts/validate_android_smoke_artifacts.py
      - tests/scripts/test_android_smoke_reliability_window.py
      - tests/scripts/test_android_smoke_issue_sync.py
      - .github/workflows/android-emulator-smoke.yml
      - .github/runner-host-watch.json
  workflow_dispatch:
    inputs:
      reason:
        description: Why run this check?
        required: false
        type: string
  schedule:
    - cron: '45 7 * * *'
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - crates/application/**
      - crates/casgrain/**
      - crates/compiler/**
      - crates/domain/**
      - crates/runner/**
      - crates/android/**
      - tests/test-support/fixtures/android-smoke/**
      - tests/test-support/fixtures/android-smoke/reliability-issue-sync/**
      - tests/test-support/scripts/android_smoke_run_plan.py
      - tests/test-support/scripts/android_smoke_reliability_window.py
      - tests/test-support/scripts/android_smoke_issue_sync.py
      - tests/test-support/scripts/validate_android_smoke_artifacts.py
      - tests/scripts/test_android_smoke_reliability_window.py
      - tests/scripts/test_android_smoke_issue_sync.py
      - .github/workflows/android-emulator-smoke.yml

permissions:
  contents: read

concurrency:
  group: android-emulator-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: android-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ARTIFACT_DIR: ${{ github.workspace }}/artifacts/android-smoke
      CASGRAIN_ANDROID_SMOKE_ARTIFACT_DIR: ${{ github.workspace }}/artifacts/android-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
        with:
          gradle-version: '8.7'

      - name: Enable KVM acceleration for Android emulator
        run: |
          set -euxo pipefail
          if [ -e /dev/kvm ]; then
            sudo chown root:"$(id -gn)" /dev/kvm
            sudo chmod 0660 /dev/kvm
            ls -l /dev/kvm
          else
            echo "/dev/kvm is not available on this runner" >&2
            exit 1
          fi

      - name: Build Android smoke fixture APK
        run: |
          set -euxo pipefail
          mkdir -p "$ARTIFACT_DIR"
          gradle -p tests/test-support/fixtures/android-smoke/app assembleDebug
          APK_DIR=tests/test-support/fixtures/android-smoke/app/build/outputs/apk/debug
          DEFAULT_APK="$APK_DIR/app-debug.apk"
          if [ -f "$DEFAULT_APK" ]; then
            APK_PATH="$DEFAULT_APK"
          else
            mapfile -t APK_CANDIDATES < <(find "$APK_DIR" -maxdepth 1 -type f -name '*.apk' | sort)
            case "${#APK_CANDIDATES[@]}" in
              1) APK_PATH="${APK_CANDIDATES[0]}" ;;
              0)
                echo "No debug APK found under $APK_DIR" >&2
                exit 1
                ;;
              *)
                printf 'Multiple debug APK candidates found under %s:\n' "$APK_DIR" >&2
                printf '  %s\n' "${APK_CANDIDATES[@]}" >&2
                exit 1
                ;;
            esac
          fi
          test -f "$APK_PATH"
          printf 'CASGRAIN_ANDROID_SMOKE_APK=%s\n' "$APK_PATH" >> "$GITHUB_ENV"

      - name: Run generated-plan Android smoke path
        uses: ReactiveCircus/android-emulator-runner@e89f39f1abbbd05b1113a29cf4db69e7540cae5a # v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          profile: pixel_7
          disable-animations: true
          emulator-options: -no-window -no-snapshot-save -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: bash -euxo pipefail -c 'adb devices; TRACE_TMP="$(mktemp "$RUNNER_TEMP/android-smoke-trace.XXXXXX.json")"; if cargo run -p casgrain -- run-android-smoke tests/test-support/fixtures/android-smoke/features/tap_counter.feature --trace-json > "$TRACE_TMP"; then mv "$TRACE_TMP" "$ARTIFACT_DIR/trace.json"; else rm -f "$TRACE_TMP"; exit 1; fi'

      - name: Validate Android smoke artifact contract
        if: always()
        run: |
          set -euxo pipefail
          python3 tests/test-support/scripts/validate_android_smoke_artifacts.py --artifact-dir "$ARTIFACT_DIR"
          ls -R "$ARTIFACT_DIR"

      - name: Upload Android smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: casgrain-android-smoke
          path: ${{ github.workspace }}/artifacts/android-smoke
          if-no-files-found: error

  reliability_report:
    name: android-smoke-reliability-report
    runs-on: ubuntu-latest
    needs: smoke
    if: always() && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
    env:
      CURRENT_HEAD_BRANCH: ${{ github.head_ref || github.ref_name }}
      CURRENT_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      CURRENT_RUN_CONCLUSION: ${{ needs.smoke.result == 'success' && 'success' || needs.smoke.result == 'cancelled' && 'cancelled' || 'failure' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download current Android smoke artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: casgrain-android-smoke
          path: ${{ runner.temp }}/current-android-smoke

      - name: Render Android smoke reliability report
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          python3 tests/test-support/scripts/android_smoke_reliability_window.py \
            --repo drousselhq/casgrain \
            --workflow android-emulator-smoke.yml \
            --artifact-name casgrain-android-smoke \
            --summary-out "$RUNNER_TEMP/android-smoke-reliability-window.json" \
            --markdown-out "$RUNNER_TEMP/android-smoke-reliability-window.md" \
            --current-run-id "${{ github.run_id }}" \
            --current-run-url "$CURRENT_RUN_URL" \
            --current-run-event "${{ github.event_name }}" \
            --current-run-head-branch "$CURRENT_HEAD_BRANCH" \
            --current-run-conclusion "$CURRENT_RUN_CONCLUSION" \
            --current-artifact-dir "$RUNNER_TEMP/current-android-smoke"

      - name: Append reliability report to workflow summary
        if: always()
        run: |
          set -euxo pipefail
          echo "## Android smoke reliability window" >> "$GITHUB_STEP_SUMMARY"
          cat "$RUNNER_TEMP/android-smoke-reliability-window.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reliability report artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-smoke-reliability-report
          path: |
            ${{ runner.temp }}/android-smoke-reliability-window.json
            ${{ runner.temp }}/android-smoke-reliability-window.md
          if-no-files-found: error

  reliability_apply:
    name: android-smoke-reliability-apply
    runs-on: ubuntu-latest
    needs: reliability_report
    if: needs.reliability_report.result == 'success' && github.event_name != 'pull_request'
    permissions:
      contents: read
      actions: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download reliability report artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: android-smoke-reliability-report
          path: ${{ runner.temp }}/android-smoke-reliability-report

      - name: Apply Android smoke issue sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euxo pipefail
          python3 tests/test-support/scripts/android_smoke_issue_sync.py \
            --repo drousselhq/casgrain \
            --summary-json "$RUNNER_TEMP/android-smoke-reliability-report/android-smoke-reliability-window.json" \
            --markdown-file "$RUNNER_TEMP/android-smoke-reliability-report/android-smoke-reliability-window.md"
