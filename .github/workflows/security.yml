name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
      GITLEAKS_TARBALL: gitleaks_8.30.1_linux_x64.tar.gz
      GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install gitleaks CLI
        run: |
          set -euxo pipefail
          bin_dir="$RUNNER_TEMP/gitleaks-bin"
          mkdir -p "$bin_dir"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${GITLEAKS_TARBALL}" -o "$RUNNER_TEMP/${GITLEAKS_TARBALL}"
          printf '%s  %s\n' "$GITLEAKS_SHA256" "$RUNNER_TEMP/${GITLEAKS_TARBALL}" | sha256sum -c -
          tar -xzf "$RUNNER_TEMP/${GITLEAKS_TARBALL}" -C "$bin_dir" gitleaks
          chmod 0755 "$bin_dir/gitleaks"
          echo "$bin_dir" >> "$GITHUB_PATH"

      - name: Detect committed secrets
        run: gitleaks git . --config .gitleaks.toml --no-banner

  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Audit dependencies
        run: cargo audit

  cargo-deny-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install cargo-deny
        run: cargo install cargo-deny --version 0.18.3 --locked

      - name: Enforce dependency policy
        run: cargo deny check licenses sources
