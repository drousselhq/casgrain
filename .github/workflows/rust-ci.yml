name: rust-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read

env:
  MIN_LINE_COVERAGE: "75"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build Rust docs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps

      - name: Run tests
        run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: 1.85.0
          components: llvm-tools-preview

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776 # v2
        with:
          tool: cargo-llvm-cov@0.6.15

      - name: Run coverage gate and export JSON summary
        id: coverage_gate
        continue-on-error: true
        run: |
          mkdir -p target/llvm-cov
          cargo llvm-cov \
            --workspace \
            --all-features \
            --fail-under-lines "$MIN_LINE_COVERAGE" \
            --summary-only \
            --json \
            --output-path target/llvm-cov/coverage-summary.json

      - name: Export LCOV report
        if: always() && hashFiles('target/llvm-cov/coverage-summary.json') != ''
        run: cargo llvm-cov report --lcov --output-path target/llvm-cov/lcov.info

      - name: Render coverage summary
        if: always() && hashFiles('target/llvm-cov/coverage-summary.json') != ''
        run: |
          python3 tests/test-support/scripts/coverage_report.py \
            --input target/llvm-cov/coverage-summary.json \
            --repo-root . \
            --threshold "$MIN_LINE_COVERAGE" \
            --summary-out target/llvm-cov/coverage-report.json \
            --markdown-out target/llvm-cov/coverage-report.md

      - name: Download main coverage baseline
        id: main_coverage_baseline
        if: github.event_name == 'pull_request' && hashFiles('target/llvm-cov/coverage-report.json') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p target/llvm-cov/main-baseline
          run_id="$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow rust-ci.yml \
            --branch main \
            --event push \
            --limit 20 \
            --json databaseId,conclusion \
            --jq '[.[] | select(.conclusion == "success")][0].databaseId')"
          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "baseline_available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh run download "$run_id" --repo "$GITHUB_REPOSITORY" -n casgrain-coverage -D target/llvm-cov/main-baseline; then
            if [ -f target/llvm-cov/main-baseline/coverage-report.json ]; then
              echo "baseline_available=true" >> "$GITHUB_OUTPUT"
              echo "baseline_run_id=$run_id" >> "$GITHUB_OUTPUT"
            else
              echo "baseline_available=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "baseline_available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Evaluate coverage non-regression
        id: coverage_non_regression
        if: github.event_name == 'pull_request' && hashFiles('target/llvm-cov/coverage-report.json') != ''
        continue-on-error: true
        run: |
          if [ "${{ steps.main_coverage_baseline.outputs.baseline_available }}" = "true" ]; then
            python3 tests/test-support/scripts/coverage_regression_check.py \
              --current target/llvm-cov/coverage-report.json \
              --baseline target/llvm-cov/main-baseline/coverage-report.json \
              --baseline-label main \
              --baseline-run-id "${{ steps.main_coverage_baseline.outputs.baseline_run_id }}" \
              --summary-out target/llvm-cov/coverage-ratchet.json \
              --markdown-out target/llvm-cov/coverage-ratchet.md
          else
            python3 tests/test-support/scripts/coverage_regression_check.py \
              --current target/llvm-cov/coverage-report.json \
              --baseline-label main \
              --summary-out target/llvm-cov/coverage-ratchet.json \
              --markdown-out target/llvm-cov/coverage-ratchet.md
          fi

      - name: Publish coverage step summary
        if: always() && hashFiles('target/llvm-cov/coverage-report.md') != ''
        run: |
          cat target/llvm-cov/coverage-report.md >> "$GITHUB_STEP_SUMMARY"
          if [ -f target/llvm-cov/coverage-ratchet.md ]; then
            printf '\n' >> "$GITHUB_STEP_SUMMARY"
            cat target/llvm-cov/coverage-ratchet.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage artifacts
        if: always() && hashFiles('target/llvm-cov/coverage-summary.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: casgrain-coverage
          path: |
            target/llvm-cov/coverage-summary.json
            target/llvm-cov/coverage-report.json
            target/llvm-cov/coverage-report.md
            target/llvm-cov/coverage-ratchet.json
            target/llvm-cov/coverage-ratchet.md
            target/llvm-cov/lcov.info

      - name: Enforce coverage gates
        if: steps.coverage_gate.outcome != 'success' || steps.coverage_non_regression.outcome == 'failure'
        run: exit 1
